name: runmate_ai
description: RunMate AI — Multi-Agent Running App (Flutter)
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  web_socket_channel: ^3.0.1
  just_audio: ^0.9.42
  flutter_dotenv: ^5.2.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  shimmer: ^3.0.0
  confetti: ^0.7.0
  lottie: ^3.2.0
  overlay_support: ^2.1.0
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/animations/
